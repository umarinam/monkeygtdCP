name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build standalone HTML
        shell: pwsh
        run: ./inline-html.ps1

      - name: Prepare Pages artifact
        shell: bash
        run: |
          mkdir -p _site
          cp monkeygtd-standalone.html _site/index.html
          cp Inbox.html _site/Inbox.html
          touch _site/.nojekyll

      - name: Validate Pages artifact
        shell: bash
        run: |
          test -f _site/index.html
          test -f _site/Inbox.html
          ls -lah _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Deploy to GitHub Pages (retry)
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
